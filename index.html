<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps CI/CD Demo by rufus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 15px;
      border-radius: 20px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }

    .info {
      margin-top: 20px;
      font-size: 1.1rem;
    }

    button {
      margin-top: 25px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00ddb3;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚀 CI/CD Pipeline Active</h1>
    <p>Automatically deployed using GitHub Actions</p>

    <div class="badge">
      Version: <span id="version">v2.0</span>
    </div>

    <div class="info">
      Last Deployment:<br>
      <span id="time"></span>
    </div>

    <button onclick="bumpVersion()">Update Version</button>

    <div class="info" style="margin-top:30px; font-size:0.9rem;">
      DevOps Experiment 8 | CI/CD Implementation
    </div>
  </div>

  <script>
    // Show deployment time
    document.getElementById("time").innerText =
      new Date().toLocaleString();

    // Simple version increment
    function bumpVersion() {
      let v = document.getElementById("version");
      let parts = v.innerText.replace('v','').split('.');
      parts[1] = parseInt(parts[1]) + 1;
      v.innerText = `v${parts[0]}.${parts[1]}`;
    }
  </script>

</body>
</html>
